name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [created]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      # Install Dependencies
      - run: npm ci

      # Run Tests (Validation)
      - run: npm test

      # Build/Bundle (This runs scripts/bundle-skills.js via prepublishOnly)
      # We run it explicitly here to verify it works before publishing
      - run: npm run prepublishOnly

      # Publish to npm (Primary)
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AG_TOKEN }}

      # Create GitHub Release (Sidebar Sync)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to GitHub Packages (Sidebar Packages)
      - name: Publish to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          npm config set registry https://npm.pkg.github.com/
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_TOKEN }}
          npm pkg set name="@dokhacgiakhoa/antigravity-ide"
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
